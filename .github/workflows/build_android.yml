name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate Android platform
        run: flutter create --platforms=android .

      - name: Configure Android camera permission
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")
          permission = '<uses-permission android:name="android.permission.CAMERA" />'
          if permission not in text:
              text = text.replace("<manifest ", f"<manifest ")
              insert_at = text.find(">") + 1
              text = text[:insert_at] + f"\n    {permission}" + text[insert_at:]
          manifest.write_text(text, encoding="utf-8")
          PY

      - name: Remove generated template test
        run: rm -f test/widget_test.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ascona-returns-apk
          path: build/app/outputs/flutter-apk/app-release.apk
